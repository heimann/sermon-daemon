name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish daemon tarballs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build release archives
        run: |
          scripts/package-release.sh --version "${GITHUB_REF_NAME}" --target x86_64-linux-gnu --arch x86_64 --out-dir dist
          scripts/package-release.sh --version "${GITHUB_REF_NAME}" --target aarch64-linux-gnu --arch aarch64 --out-dir dist

      - name: Verify release archive checksums
        run: |
          cd dist
          sha256sum -c *.sha256

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "${GITHUB_REF_NAME}" \
            --notes "Sermon Daemon ${GITHUB_REF_NAME}" \
            --verify-tag
